apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-yaml
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/bablu3k/monitoring-yaml-gitops.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true